version: 2
# Single dependency updater for qrtak (Renovate retired here — it can't open PRs
# with GITHUB_TOKEN, and a scoped PAT can only be made in the UI).
#
# Supply-chain hardening:
#   - cooldown: don't propose a version until it's been public >=5 days, so the
#     active npm-worm waves (Shai-Hulud/node-ipc) — which are detected & yanked
#     within hours-to-days — are never adopted in their live window.
#   - Dependabot preserves SHA-pinned actions (@<sha> # vX) and Docker digests
#     on bump, so updates never regress the pinning hardening.
#   - The CI malware/critical gate (security.yml) hard-fails any compromised dep.
updates:
  # npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 10
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "npm"
    groups:
      # Group all npm development dependencies together
      dev-dependencies:
        patterns:
          - "@babel/*"
          - "@semantic-release/*"
          - "eslint*"
          - "jest*"
          - "babel-jest"
        dependency-type: "development"
      # Group all production dependencies together
      production:
        dependency-type: "production"
    ignore:
      # Ignore major version updates for critical dependencies
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "jest"
        update-types: ["version-update:semver-major"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    cooldown:
      default-days: 5
    open-pull-requests-limit: 5
    commit-message:
      prefix: "fix"
      prefix-development: "fix"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
