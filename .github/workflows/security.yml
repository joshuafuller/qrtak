name: Security Scanning

on:
  push:
    branches: [main, develop, 'release-please--**']
  pull_request:
    branches: [main, develop]
    # No path filters - security scans run on ALL PRs for maximum security
  schedule:
    # Weekly comprehensive scan
    - cron: '0 2 * * 0'
  workflow_dispatch:
    inputs:
      deep_scan:
        description: 'Run deep security scan'
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  actions: read
  id-token: write

jobs:
  # Code and dependency scanning
  code-scanning:
    name: Code Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.1
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          npm_config_package_lock: false

      # Secret Detection
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@37b77001d0174ebec2fcca2bd83ff83a6d45a3ab # v3.95.3
        continue-on-error: true
        with:
          base: "${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before || github.event.repository.default_branch }}"
          head: "${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}"
          extra_args: --debug --only-verified

      # SAST with Semgrep
      - name: Semgrep SAST
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        continue-on-error: true
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

      # Dependency Scanning
      # Informational: surface all moderate+ advisories (non-blocking).
      - name: npm audit (report)
        run: npm audit --audit-level=moderate || true

      # HARD GATE: fail the pipeline on a COMPROMISED dependency.
      # - Known-malicious packages are tagged CWE-506 (Embedded Malicious Code)
      #   in the GitHub Advisory DB; we fail on these at ANY severity.
      # - Critical-severity advisories also block (defense in depth).
      # Audits the full tree (incl. dev deps — worms often hit build tooling).
      # Threshold is `critical` so routine moderate/high dev CVEs don't break CI;
      # malware is caught regardless of severity via the CWE-506 check.
      - name: Block malicious or critical dependencies
        run: |
          set -uo pipefail
          echo "Scanning dependency tree for malicious / critical advisories…"
          audit="$(npm audit --json 2>/dev/null || true)"
          if printf '%s' "$audit" | grep -qiE 'CWE-50[67]|malware|malicious (package|code|version|dependenc)'; then
            echo "::error title=Compromised dependency::A known-malicious package is in the dependency tree — failing the build."
            printf '%s' "$audit" | python3 -c "import sys,json; d=json.load(sys.stdin); [print('::error::', k, '->', v.get('severity'), [ (x.get('title') if isinstance(x,dict) else x) for x in v.get('via',[]) ]) for k,v in d.get('vulnerabilities',{}).items()]" 2>/dev/null || true
            exit 1
          fi
          # Fail on any critical-severity advisory (malware is typically critical too).
          npm audit --audit-level=critical
          echo "✓ No malicious or critical advisories."

      - name: Snyk Security Scan
        if: github.actor != 'dependabot[bot]'
        uses: snyk/actions/node@9adf32b1121593767fc3c057af55b55db032dc04 # v1.0.0
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high

      - name: OSV Scanner
        run: |
          curl -sSfL https://github.com/google/osv-scanner/releases/download/v1.9.1/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner
          ./osv-scanner --format sarif . > osv-results.sarif || true
          
      - name: Upload OSV results
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always() && hashFiles('osv-results.sarif') != ''
        with:
          sarif_file: osv-results.sarif
          category: osv

  # Container Security
  container-scanning:
    name: Container Security Analysis
    runs-on: ubuntu-latest
    if: |
      contains(github.event.head_commit.message, '[docker]') ||
      contains(fromJson('["push", "workflow_dispatch"]'), github.event_name) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'docker'))
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Build Docker image
        run: docker build -t qrtak:scan .

      # Trivy Scan
      # NOTE: v0.33.1 bundled trivy v0.65.0, whose installer fails on the
      # GitHub-hosted runner (exits 1 right after resolving the version, before
      # any scan). v0.36.0 installs a working trivy build. exit-code 0 keeps
      # findings non-blocking (reported to code scanning via SARIF below).
      # Cache left at default (enabled) — disabling it forces a DB re-download
      # every run and raises rate-limit risk (per trivy-action v0.36.0 docs).
      - name: Run Trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: qrtak:scan
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always() && hashFiles('trivy-results.sarif') != ''
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy'

      # Grype Scan
      - name: Run Grype
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: grype
        with:
          image: qrtak:scan
          fail-build: false
          severity-cutoff: high
          output-format: sarif

      - name: Upload Grype results
        uses: github/codeql-action/upload-sarif@7211b7c8077ea37d8641b6271f6a365a22a5fbfa # v4
        if: always()
        with:
          sarif_file: ${{ steps.grype.outputs.sarif }}
          category: 'grype'

  # Supply Chain Security
  supply-chain:
    name: Supply Chain Security
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.1
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          npm_config_package_lock: false

      # Generate SBOM
      - name: Generate SBOM
        uses: anchore/sbom-action@61119d458adab75f756bc0b9e4bde25725f86a7a # v0.17.2
        with:
          format: spdx-json
          output-file: sbom.spdx.json
          upload-artifact: true
          upload-artifact-retention: 30

      # Check for typosquatting
      - name: Check for typosquatting
        run: |
          # Verify qrcode package is the legitimate one
          QRCODE_REPO=$(npm view qrcode repository.url 2>/dev/null || echo "")
          if [[ "$QRCODE_REPO" != *"github.com/soldair/node-qrcode"* ]]; then
            echo "ERROR: qrcode package appears to be from wrong source!"
            echo "Expected: github.com/soldair/node-qrcode"
            echo "Got: $QRCODE_REPO"
            exit 1
          fi
          
          # Check for typosquatting patterns in other packages
          npm ls --depth=0 --json 2>/dev/null | jq -r '.dependencies | keys[]' | while read pkg; do
            # Skip our verified packages
            if [ "$pkg" = "qrcode" ]; then
              echo "✓ qrcode - verified legitimate package"
              continue
            fi
            
            # Check for suspicious patterns
            if echo "$pkg" | grep -E "(qrcod[^e]|qr-cod|qrcode[0-9]|vit[0-9]|jes[0-9])" > /dev/null; then
              echo "WARNING: Potential typosquatting detected: $pkg"
              exit 1
            fi
          done

  # Fuzz Testing
  fuzz-testing:
    name: Fuzz Testing
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'schedule' || 
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deep_scan == 'true')
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit
      - name: Checkout
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v4.0.1
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm ci
          npm install --save-dev @jazzer.js/core
        env:
          PUPPETEER_SKIP_DOWNLOAD: true
          npm_config_package_lock: false

      - name: Create fuzz test directory
        run: mkdir -p tests

      - name: Run Fuzz Tests
        run: |
          echo "Running fuzz tests..."
          # Quick fuzz for PRs (10 seconds), longer for scheduled runs (5 minutes)
          if [[ "${{ github.event_name }}" == "schedule" ]]; then
            FUZZ_TIME=300000  # 5 minutes for scheduled runs
          else
            FUZZ_TIME=10000   # 10 seconds for PRs
          fi
          echo "Fuzzing for $((FUZZ_TIME/1000)) seconds..."
          npx jazzer fuzz tests/fuzz.test.js --sync_timeout=30000 --time_limit_ms=$FUZZ_TIME || true
          echo "Fuzz testing completed"
        continue-on-error: true